<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - India Stock Exchange</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f0f2f5;
      color: #1e2329;
      min-height: 100vh;
      padding: 20px;
    }
    .admin-container {
      max-width: 1200px;
      margin: 0 auto;
    }
    .admin-header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 20px 30px;
      border-radius: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      flex-wrap: wrap;
      gap: 12px;
    }
    .admin-header h1 {
      color: #f0b90b;
      font-size: 22px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .admin-header h1 span {
      color: #fff;
      font-weight: 400;
      font-size: 14px;
    }
    .admin-header .admin-info {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #fff;
      font-size: 14px;
    }
    .admin-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: #fff;
      border-radius: 12px;
      padding: 18px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border: 1px solid #eaecf0;
    }
    .stat-card .label {
      font-size: 12px;
      color: #707a8a;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stat-card .value {
      font-size: 24px;
      font-weight: 800;
      margin-top: 6px;
      color: #1e2329;
    }
    .stat-card .value.gold { color: #f0b90b; }
    .stat-card .value.green { color: #03a66d; }
    .stat-card .value.red { color: #cf304a; }
    .stat-card .value.blue { color: #3b82f6; }
    .admin-tabs {
      display: flex;
      gap: 6px;
      background: #fff;
      padding: 6px;
      border-radius: 12px;
      margin-bottom: 24px;
      border: 1px solid #eaecf0;
      flex-wrap: wrap;
    }
    .admin-tab {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      background: transparent;
      font-size: 14px;
      font-weight: 600;
      color: #707a8a;
      cursor: pointer;
      transition: 0.2s;
    }
    .admin-tab:hover { background: #f5f5f5; }
    .admin-tab.active {
      background: #f0b90b;
      color: #000;
    }
    .admin-panel {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      border: 1px solid #eaecf0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .panel-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    .table-wrap {
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      background: #f8f9fa;
      text-align: left;
      padding: 12px 14px;
      font-weight: 600;
      color: #707a8a;
      border-bottom: 2px solid #eaecf0;
      white-space: nowrap;
    }
    td {
      padding: 12px 14px;
      border-bottom: 1px solid #eaecf0;
      vertical-align: middle;
    }
    tr:hover td { background: #fafbfc; }
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-success { background: #e8f8f0; color: #03a66d; }
    .badge-pending { background: #fff4e5; color: #f59e0b; }
    .badge-danger { background: #fef0f0; color: #cf304a; }
    .badge-info { background: #e5f0ff; color: #3b82f6; }
    .badge-warning { background: #fef3c7; color: #d97706; }
    .btn-sm {
      padding: 5px 14px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-sm:active { transform: scale(0.95); }
    .btn-approve { background: #03a66d; color: #fff; }
    .btn-approve:hover { background: #02955f; }
    .btn-reject { background: #cf304a; color: #fff; }
    .btn-reject:hover { background: #b82a42; }
    .btn-ban { background: #dc2626; color: #fff; }
    .btn-unban { background: #16a34a; color: #fff; }
    .btn-edit { background: #3b82f6; color: #fff; }
    .btn-edit:hover { background: #2563eb; }
    .btn-primary { background: #f0b90b; color: #000; }
    .btn-primary:hover { background: #d4a00a; }
    .search-box {
      padding: 10px 16px;
      border: 1px solid #eaecf0;
      border-radius: 8px;
      font-size: 14px;
      width: 250px;
      outline: none;
      transition: 0.2s;
    }
    .search-box:focus { border-color: #f0b90b; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .mt-16 { margin-top: 16px; }
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: #fff;
      border-radius: 16px;
      padding: 30px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-box h3 { font-size: 20px; margin-bottom: 16px; }
    .modal-box label { font-size: 13px; font-weight: 600; color: #707a8a; display: block; margin-bottom: 4px; }
    .modal-box input, .modal-box select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #eaecf0;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
    }
    .modal-box input:focus, .modal-box select:focus { border-color: #f0b90b; }
    .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
    .modal-actions button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .btn-secondary { background: #eaecf0; color: #1e2329; }
    .btn-danger { background: #cf304a; color: #fff; }
    .empty-state { text-align: center; padding: 40px; color: #707a8a; }
    .toast {
      position: fixed; top: 20px; right: 20px; background: #1e2329; color: #fff;
      padding: 14px 24px; border-radius: 10px; font-weight: 600; z-index: 9999;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .settings-card {
      padding: 20px;
      border: 1px solid #eaecf0;
      border-radius: 12px;
    }
    .settings-card h4 { margin-bottom: 12px; }
    .settings-card input, .settings-card select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #eaecf0;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 8px;
      outline: none;
    }
    .settings-card input:focus { border-color: #f0b90b; }
    @media (max-width: 768px) {
      .admin-header { flex-direction: column; text-align: center; }
      .search-box { width: 100%; }
      .admin-stats { grid-template-columns: 1fr 1fr; }
      .settings-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="admin-container" id="app">
  <!-- Header -->
  <div class="admin-header">
    <h1>🛡️ Admin Panel <span>India Stock Exchange</span></h1>
    <div class="admin-info">
      <span>👤 Admin</span>
      <button class="btn-sm btn-edit" onclick="logout()" style="background:#cf304a;color:#fff;">Logout</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="admin-stats" id="statsContainer">
    <div class="stat-card"><div class="label">Total Users</div><div class="value gold" id="totalUsers">0</div></div>
    <div class="stat-card"><div class="label">Total Deposits</div><div class="value green" id="totalDeposits">$0</div></div>
    <div class="stat-card"><div class="label">Pending Withdrawals</div><div class="value red" id="pendingWithdrawals">0</div></div>
    <div class="stat-card"><div class="label">Pending Deposits</div><div class="value blue" id="pendingDeposits">0</div></div>
  </div>

  <!-- Tabs -->
  <div class="admin-tabs">
    <button class="admin-tab active" data-tab="users" onclick="switchTab('users')">👥 Users</button>
    <button class="admin-tab" data-tab="deposits" onclick="switchTab('deposits')">💰 Deposits</button>
    <button class="admin-tab" data-tab="withdrawals" onclick="switchTab('withdrawals')">💸 Withdrawals</button>
    <button class="admin-tab" data-tab="trades" onclick="switchTab('trades')">📊 Trades</button>
    <button class="admin-tab" data-tab="settings" onclick="switchTab('settings')">⚙️ Settings</button>
  </div>

  <!-- Panel -->
  <div class="admin-panel" id="panelContent">
    <!-- Dynamic content rendered by JS -->
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <h3 id="modalTitle">Edit User</h3>
    <div id="modalBody"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" id="modalSaveBtn" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// ADMIN PANEL - Full Control (LocalStorage Based)
// ============================================================

// --- DATA STORE ---
function getUsers() {
  try { return JSON.parse(localStorage.getItem('dex_users') || '[]'); } catch(e) { return []; }
}
function saveUsers(users) {
  localStorage.setItem('dex_users', JSON.stringify(users));
}
function getDeposits() {
  try { return JSON.parse(localStorage.getItem('admin_deposits') || '[]'); } catch(e) { return []; }
}
function saveDeposits(d) {
  localStorage.setItem('admin_deposits', JSON.stringify(d));
}
function getWithdrawals() {
  try { return JSON.parse(localStorage.getItem('admin_withdrawals') || '[]'); } catch(e) { return []; }
}
function saveWithdrawals(w) {
  localStorage.setItem('admin_withdrawals', JSON.stringify(w));
}
function getTrades() {
  try { return JSON.parse(localStorage.getItem('admin_trades') || '[]'); } catch(e) { return []; }
}
function saveTrades(t) {
  localStorage.setItem('admin_trades', JSON.stringify(t));
}

// --- SEED DATA ---
function seedData() {
  let users = getUsers();
  if (users.length === 0) {
    users = [
      { id: 'u_1', name: 'Admin User', email: 'admin@indiaex.com', pass: 'admin123', tgUser: '@admin', tgNum: '+91 9999999999', bal: 100000, bonus: 5000, coins: {}, positions: [], history: [], deposits: [], earnOrders: [], miningPlans: [], joined: '2025-01-01T00:00:00.000Z', banned: false },
      { id: 'u_2', name: 'Rajesh Kumar', email: 'rajesh@gmail.com', pass: 'pass1234', tgUser: '@rajesh', tgNum: '+91 9876543210', bal: 25000, bonus: 1000, coins: { BTC: { qty: 0.5, avgPrice: 60000, totalCost: 30000 } }, positions: [], history: [], deposits: [], earnOrders: [], miningPlans: [], joined: '2025-02-15T00:00:00.000Z', banned: false },
      { id: 'u_3', name: 'Priya Singh', email: 'priya@gmail.com', pass: 'priya456', tgUser: '@priya', tgNum: '+91 8765432109', bal: 5000, bonus: 200, coins: {}, positions: [], history: [], deposits: [], earnOrders: [], miningPlans: [], joined: '2025-03-01T00:00:00.000Z', banned: false },
      { id: 'u_4', name: 'Amit Sharma', email: 'amit@gmail.com', pass: 'amit789', tgUser: '@amit', tgNum: '+91 9876543211', bal: 12000, bonus: 500, coins: { ETH: { qty: 2, avgPrice: 3000, totalCost: 6000 } }, positions: [], history: [], deposits: [], earnOrders: [], miningPlans: [], joined: '2025-03-15T00:00:00.000Z', banned: false }
    ];
    saveUsers(users);
  }
  let deposits = getDeposits();
  if (deposits.length === 0) {
    deposits = [
      { id: 'dep_1', deposit_id: 'DEP-001', user_id: 'u_2', user_name: 'Rajesh Kumar', amount: 1000, coin: 'USDT', network: 'BSC20', code: 'ABC123', status: 'completed', tx_hash: '0xabc...', from_address: '0x...', to_address: '0xdce...', created_at: '2025-03-10T10:00:00.000Z' },
      { id: 'dep_2', deposit_id: 'DEP-002', user_id: 'u_3', user_name: 'Priya Singh', amount: 500, coin: 'USDT', network: 'TRC20', code: 'XYZ789', status: 'pending', tx_hash: '', from_address: '', to_address: 'TEe7...', created_at: '2025-03-12T14:30:00.000Z' },
      { id: 'dep_3', deposit_id: 'DEP-003', user_id: 'u_4', user_name: 'Amit Sharma', amount: 2000, coin: 'USDT', network: 'ERC20', code: 'DEF456', status: 'pending', tx_hash: '', from_address: '', to_address: '0xdce...', created_at: '2025-03-13T09:00:00.000Z' }
    ];
    saveDeposits(deposits);
  }
  let withdrawals = getWithdrawals();
  if (withdrawals.length === 0) {
    withdrawals = [
      { id: 'wd_1', withdrawal_id: 'WD-001', user_id: 'u_2', user_name: 'Rajesh Kumar', amount: 200, coin: 'USDT', network: 'ERC20', address: '0xdef...', status: 'pending', tx_hash: '', created_at: '2025-03-11T09:00:00.000Z' },
      { id: 'wd_2', withdrawal_id: 'WD-002', user_id: 'u_4', user_name: 'Amit Sharma', amount: 500, coin: 'USDT', network: 'BSC20', address: '0xabc...', status: 'pending', tx_hash: '', created_at: '2025-03-13T11:00:00.000Z' }
    ];
    saveWithdrawals(withdrawals);
  }
  let trades = getTrades();
  if (trades.length === 0) {
    trades = [
      { id: 'tr_1', trade_id: 'TR-001', user_id: 'u_2', user_name: 'Rajesh Kumar', symbol: 'BTC', type: 'spot_buy', direction: 'long', quantity: 0.01, price: 65000, amount: 650, fee: 0.65, leverage: 1, pnl: 0, status: 'closed', created_at: '2025-03-10T11:00:00.000Z' },
      { id: 'tr_2', trade_id: 'TR-002', user_id: 'u_4', user_name: 'Amit Sharma', symbol: 'ETH', type: 'spot_buy', direction: 'long', quantity: 0.5, price: 3200, amount: 1600, fee: 1.6, leverage: 1, pnl: 0, status: 'closed', created_at: '2025-03-12T15:00:00.000Z' }
    ];
    saveTrades(trades);
  }
}
seedData();

// --- STATE ---
let currentTab = 'users';
let modalCallback = null;
let modalData = null;

// --- HELPERS ---
function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function getUsername(users, uid) {
  const u = users.find(x => x.id === uid);
  return u ? u.name : uid;
}

function formatDate(d) {
  return new Date(d).toLocaleString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function formatCurrency(n) {
  return '₹' + Number(n).toFixed(2);
}

// --- RENDER STATS ---
function renderStats() {
  const users = getUsers();
  const deposits = getDeposits();
  const withdrawals = getWithdrawals();
  document.getElementById('totalUsers').textContent = users.length;
  const totalDep = deposits.filter(d => d.status === 'completed').reduce((s, d) => s + d.amount, 0);
  document.getElementById('totalDeposits').textContent = '₹' + totalDep.toFixed(2);
  document.getElementById('pendingWithdrawals').textContent = withdrawals.filter(w => w.status === 'pending').length;
  document.getElementById('pendingDeposits').textContent = deposits.filter(d => d.status === 'pending').length;
}

// --- SWITCH TAB ---
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.admin-tab').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tab);
  });
  renderPanel();
}

// --- RENDER PANEL ---
function renderPanel() {
  const container = document.getElementById('panelContent');
  switch(currentTab) {
    case 'users': renderUsers(container); break;
    case 'deposits': renderDeposits(container); break;
    case 'withdrawals': renderWithdrawals(container); break;
    case 'trades': renderTrades(container); break;
    case 'settings': renderSettings(container); break;
    default: container.innerHTML = '<div class="empty-state">Select a tab</div>';
  }
  renderStats();
}

// ============================================================
// USERS TABLE
// ============================================================
function renderUsers(container) {
  const users = getUsers();
  let html = `
    <div class="flex-between">
      <div class="panel-title">👥 All Users (${users.length})</div>
      <input class="search-box" placeholder="Search by name or email..." oninput="filterUsers(this.value)" id="userSearch">
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Name</th><th>Email</th><th>Balance</th><th>Telegram</th><th>Joined</th><th>Status</th><th>Actions</th>
        </tr></thead>
        <tbody id="userTableBody">
          ${users.map((u, i) => `
            <tr>
              <td><strong>${u.name}</strong></td>
              <td>${u.email}</td>
              <td>${formatCurrency(u.bal)}</td>
              <td>${u.tgUser || '—'}</td>
              <td>${formatDate(u.joined)}</td>
              <td><span class="badge ${u.banned ? 'badge-danger' : 'badge-success'}">${u.banned ? 'Banned' : 'Active'}</span></td>
              <td>
                <button class="btn-sm btn-edit" onclick="editUser('${u.id}')">✏️</button>
                <button class="btn-sm ${u.banned ? 'btn-unban' : 'btn-ban'}" onclick="toggleBan('${u.id}')">${u.banned ? 'Unban' : 'Ban'}</button>
                <button class="btn-sm btn-approve" onclick="adjustBalance('${u.id}')">💰</button>
                <button class="btn-sm btn-edit" onclick="viewUserDetails('${u.id}')">📋</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
    <button class="btn-sm btn-primary" onclick="addSampleUser()" style="margin-top:12px;">➕ Add Sample User</button>
  `;
  container.innerHTML = html;
}

function filterUsers(val) {
  const rows = document.querySelectorAll('#userTableBody tr');
  const q = val.toLowerCase();
  rows.forEach(row => {
    const text = row.textContent.toLowerCase();
    row.style.display = text.includes(q) ? '' : 'none';
  });
}

function addSampleUser() {
  const users = getUsers();
  const newUser = {
    id: 'u_' + Date.now(),
    name: 'Sample User ' + (users.length + 1),
    email: 'sample' + Date.now() + '@gmail.com',
    pass: 'sample123',
    tgUser: '@sample',
    tgNum: '+91 9876543210',
    bal: 1000,
    bonus: 0,
    coins: {},
    positions: [],
    history: [],
    deposits: [],
    earnOrders: [],
    miningPlans: [],
    joined: new Date().toISOString(),
    banned: false
  };
  users.push(newUser);
  saveUsers(users);
  toast('Sample user added!');
  renderPanel();
}

// --- USER ACTIONS ---
function editUser(id) {
  const users = getUsers();
  const u = users.find(x => x.id === id);
  if (!u) return toast('User not found');
  modalData = u;
  document.getElementById('modalTitle').textContent = 'Edit User: ' + u.name;
  document.getElementById('modalBody').innerHTML = `
    <label>Name</label><input id="mName" value="${u.name}">
    <label>Email</label><input id="mEmail" value="${u.email}">
    <label>Password</label><input id="mPass" value="${u.pass}">
    <label>Telegram</label><input id="mTg" value="${u.tgUser || ''}">
    <label>Phone</label><input id="mNum" value="${u.tgNum || ''}">
    <label>Balance (₹)</label><input id="mBal" type="number" step="0.01" value="${u.bal}">
    <label>Bonus (₹)</label><input id="mBonus" type="number" step="0.01" value="${u.bonus || 0}">
  `;
  modalCallback = function() {
    const users2 = getUsers();
    const idx = users2.findIndex(x => x.id === id);
    if (idx === -1) return toast('User not found');
    users2[idx].name = document.getElementById('mName').value.trim() || users2[idx].name;
    users2[idx].email = document.getElementById('mEmail').value.trim() || users2[idx].email;
    users2[idx].pass = document.getElementById('mPass').value.trim() || users2[idx].pass;
    users2[idx].tgUser = document.getElementById('mTg').value.trim();
    users2[idx].tgNum = document.getElementById('mNum').value.trim();
    users2[idx].bal = parseFloat(document.getElementById('mBal').value) || users2[idx].bal;
    users2[idx].bonus = parseFloat(document.getElementById('mBonus').value) || 0;
    saveUsers(users2);
    toast('User updated!');
    closeModal();
    renderPanel();
  };
  document.getElementById('modalOverlay').classList.add('open');
}

function toggleBan(id) {
  const users = getUsers();
  const u = users.find(x => x.id === id);
  if (!u) return toast('User not found');
  u.banned = !u.banned;
  saveUsers(users);
  toast(u.banned ? 'User banned' : 'User unbanned');
  renderPanel();
}

function adjustBalance(id) {
  const users = getUsers();
  const u = users.find(x => x.id === id);
  if (!u) return toast('User not found');
  modalData = u;
  document.getElementById('modalTitle').textContent = 'Adjust Balance: ' + u.name;
  document.getElementById('modalBody').innerHTML = `
    <label>Current Balance: ₹${u.bal.toFixed(2)}</label>
    <label>Add Amount (₹)</label><input id="mAddAmt" type="number" step="0.01" placeholder="Enter amount to add" value="100">
    <label>Or Set Balance (₹)</label><input id="mSetBal" type="number" step="0.01" placeholder="Enter new balance">
  `;
  modalCallback = function() {
    const users2 = getUsers();
    const idx = users2.findIndex(x => x.id === id);
    if (idx === -1) return toast('User not found');
    const addAmt = parseFloat(document.getElementById('mAddAmt').value);
    const setBal = parseFloat(document.getElementById('mSetBal').value);
    if (setBal >= 0) {
      users2[idx].bal = setBal;
    } else if (addAmt > 0) {
      users2[idx].bal += addAmt;
    } else {
      return toast('Enter a valid amount');
    }
    saveUsers(users2);
    toast('Balance updated!');
    closeModal();
    renderPanel();
  };
  document.getElementById('modalOverlay').classList.add('open');
}

function viewUserDetails(id) {
  const users = getUsers();
  const u = users.find(x => x.id === id);
  if (!u) return toast('User not found');
  const deposits = getDeposits().filter(d => d.user_id === id);
  const withdrawals = getWithdrawals().filter(w => w.user_id === id);
  const trades = getTrades().filter(t => t.user_id === id);
  document.getElementById('modalTitle').textContent = 'User Details: ' + u.name;
  document.getElementById('modalBody').innerHTML = `
    <div style="margin-bottom:12px;"><strong>Name:</strong> ${u.name}</div>
    <div style="margin-bottom:12px;"><strong>Email:</strong> ${u.email}</div>
    <div style="margin-bottom:12px;"><strong>Balance:</strong> ${formatCurrency(u.bal)}</div>
    <div style="margin-bottom:12px;"><strong>Bonus:</strong> ${formatCurrency(u.bonus || 0)}</div>
    <div style="margin-bottom:12px;"><strong>Telegram:</strong> ${u.tgUser || 'N/A'}</div>
    <div style="margin-bottom:12px;"><strong>Phone:</strong> ${u.tgNum || 'N/A'}</div>
    <div style="margin-bottom:12px;"><strong>Joined:</strong> ${formatDate(u.joined)}</div>
    <div style="margin-bottom:12px;"><strong>Status:</strong> ${u.banned ? 'Banned' : 'Active'}</div>
    <hr>
    <div style="margin-top:12px;"><strong>Deposits:</strong> ${deposits.length} (Total: ${formatCurrency(deposits.reduce((s,d) => s + (d.status === 'completed' ? d.amount : 0), 0))})</div>
    <div style="margin-top:8px;"><strong>Withdrawals:</strong> ${withdrawals.length} (Total: ${formatCurrency(withdrawals.reduce((s,w) => s + (w.status === 'completed' ? w.amount : 0), 0))})</div>
    <div style="margin-top:8px;"><strong>Trades:</strong> ${trades.length}</div>
  `;
  modalCallback = null;
  document.getElementById('modalSaveBtn').style.display = 'none';
  document.getElementById('modalOverlay').classList.add('open');
  // Show close button
  document.querySelector('.modal-actions').innerHTML = `
    <button class="btn-secondary" onclick="closeModal()">Close</button>
  `;
}

// DEPOSITS TABLE
// ============================================================
function renderDeposits(container) {
  const deposits = getDeposits();
  const users = getUsers();
  let html = `
    <div class="panel-title">💰 Deposits (${deposits.length})</div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>User</th><th>Amount</th><th>Coin</th><th>Network</th><th>Status</th><th>Date</th><th>Actions</th>
        </tr></thead>
        <tbody>
          ${deposits.map((d, i) => `
            <tr>
              <td>${d.user_name || getUsername(users, d.user_id)}</td>
              <td>${formatCurrency(d.amount)}</td>
              <td>${d.coin || 'USDT'}</td>
              <td>${d.network || '—'}</td>
              <td><span class="badge ${d.status === 'completed' ? 'badge-success' : d.status === 'pending' ? 'badge-pending' : 'badge-danger'}">${d.status}</span></td>
              <td>${formatDate(d.created_at)}</td>
              <td>
                ${d.status === 'pending' ? `
                  <button class="btn-sm btn-approve" onclick="approveDeposit('${d.id}')">Approve</button>
                  <button class="btn-sm btn-reject" onclick="rejectDeposit('${d.id}')">Reject</button>
                ` : '—'}
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
    <button class="btn-sm btn-primary" onclick="addSampleDeposit()" style="margin-top:12px;">➕ Add Sample Deposit</button>
  `;
  container.innerHTML = html;
}

function approveDeposit(id) {
  const deposits = getDeposits();
  const d = deposits.find(x => x.id === id);
  if (!d) return toast('Not found');
  d.status = 'completed';
  saveDeposits(deposits);
  const users = getUsers();
  const u = users.find(x => x.id === d.user_id);
  if (u) { u.bal += d.amount; saveUsers(users); }
  toast('Deposit approved!');
  renderPanel();
}

function rejectDeposit(id) {
  const deposits = getDeposits();
  const d = deposits.find(x => x.id === id);
  if (!d) return toast('Not found');
  d.status = 'failed';
  saveDeposits(deposits);
  toast('Deposit rejected');
  renderPanel();
}

function addSampleDeposit() {
  const users = getUsers();
  if (users.length < 2) return toast('Need at least 2 users');
  const deposits = getDeposits();
  const u = users[Math.floor(Math.random() * users.length)];
  deposits.push({
    id: 'dep_' + Date.now(),
    deposit_id: 'DEP-' + String(Date.now()).slice(-6),
    user_id: u.id,
    user_name: u.name,
    amount: Math.round((Math.random() * 500 + 100) * 100) / 100,
    coin: 'USDT',
    network: ['BSC20', 'TRC20', 'ERC20'][Math.floor(Math.random()*3)],
    code: 'CODE' + Math.random().toString(36).slice(2,6).toUpperCase(),
    status: 'pending',
    tx_hash: '',
    from_address: '0x...',
    to_address: '0xdce...',
    created_at: new Date().toISOString()
  });
  saveDeposits(deposits);
  toast('Sample deposit added');
  renderPanel();
}

function renderWithdrawals(container) {
  const withdrawals = getWithdrawals();
  const users = getUsers();
  let html = `
    <div class="panel-title">💸 Withdrawals (${withdrawals.length})</div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>User</th><th>Amount</th><th>Coin</th><th>Address</th><th>Status</th><th>Date</th><th>Actions</th>
        </tr></thead>
        <tbody>
          ${withdrawals.map((w, i) => `
            <tr>
              <td>${w.user_name || getUsername(users, w.user_id)}</td>
              <td>${formatCurrency(w.amount)}</td>
              <td>${w.coin || 'USDT'}</td>
              <td style="font-size:11px;max-width:120px;overflow:hidden;text-overflow:ellipsis;">${w.address || '—'}</td>
              <td><span class="badge ${w.status === 'completed' ? 'badge-success' : w.status === 'pending' ? 'badge-pending' : 'badge-danger'}">${w.status}</span></td>
              <td>${formatDate(w.created_at)}</td>
              <td>
                ${w.status === 'pending' ? `
                  <button class="btn-sm btn-approve" onclick="approveWithdrawal('${w.id}')">Approve</button>
                  <button class="btn-sm btn-reject" onclick="rejectWithdrawal('${w.id}')">Reject</button>
                ` : '—'}
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
  container.innerHTML = html;
}

function approveWithdrawal(id) {
  const withdrawals = getWithdrawals();
  const w = withdrawals.find(x => x.id === id);
  if (!w) return toast('Not found');
  w.status = 'completed';
  saveWithdrawals(withdrawals);
  const users = getUsers();
  const u = users.find(x => x.id === w.user_id);
  if (u) { u.bal = Math.max(0, u.bal - w.amount); saveUsers(users); }
  toast('Withdrawal approved!');
  renderPanel();
}

function rejectWithdrawal(id) {
  const withdrawals = getWithdrawals();
  const w = withdrawals.find(x => x.id === id);
  if (!w) return toast('Not found');
  w.status = 'failed';
  saveWithdrawals(withdrawals);
  toast('Withdrawal rejected');
  renderPanel();
}

function saveAddresses() {
  toast('Addresses saved!');
}

function saveSystemSettings() {
  toast('System settings saved!');
}

function exportData() {
  const data = {
    users: getUsers(),
    deposits: getDeposits(),
    withdrawals: getWithdrawals(),
    trades: getTrades()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'admin_export_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  toast('Data exported!');
}

function clearAllData() {
  if (!confirm('⚠️ This will delete ALL data. Are you sure?')) return;
  if (!confirm('Final confirmation: Delete everything?')) return;
  localStorage.removeItem('dex_users');
  localStorage.removeItem('admin_deposits');
  localStorage.removeItem('admin_withdrawals');
  localStorage.removeItem('admin_trades');
  seedData();
  toast('All data cleared and reset!');
  renderPanel();
}

function resetAllUsers() {
  if (!confirm('Reset all users to default?')) return;
  seedData();
  toast('Users reset to default!');
  renderPanel();
}

function giveAllUsersBonus() {
  const users = getUsers();
  users.forEach(u => { u.bonus = (u.bonus || 0) + 100; });
  saveUsers(users);
  toast('₹100 bonus given to all users!');
  renderPanel();
}

// ============================================================
// MODAL
// ============================================================
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  modalCallback = null;
  modalData = null;
  document.getElementById('modalSaveBtn').style.display = 'block';
  document.querySelector('.modal-actions').innerHTML = `
    <button class="btn-secondary" onclick="closeModal()">Cancel</button>
    <button class="btn-primary" id="modalSaveBtn" onclick="saveModal()">Save</button>
  `;
}

function saveModal() {
  if (modalCallback) modalCallback();
}

// ============================================================
// LOGOUT
// ============================================================
function logout() {
  if (confirm('Logout from admin?')) {
    toast('Logged out');
    renderPanel();
  }
}

// ============================================================
renderPanel();
